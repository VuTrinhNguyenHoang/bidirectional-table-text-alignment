project:
  name: bidirectional-table-text-alignment
  seed: 42

paths:
  raw_dir: outputs/data/raw
  processed_dir: outputs/data/processed
  checkpoint_dir: outputs/checkpoints
  prediction_dir: outputs/predictions
  metric_dir: outputs/metrics

data:
  debug:
    train: 500
    valid: 100
  
  small:
    train: 5000
    valid: 1000

  medium:
    train: 20000
    valid: 5000

  full:
    train: null
    valid: null

model:
  name: google-t5/t5-small
  max_input_length: 512
  max_target_length: 64

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  weight_decay: 0.01
  eval_steps: 3000
  save_steps: 3000
  logging_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true

generation:
  num_beams: 4
  max_new_tokens: 64
  no_repeat_ngram_size: 3

cell_selector:
  name: distilbert-base-uncased
  max_input_length: 384
  top_k: 5

training_cell_selector:
  epochs: 3
  negative_ratio: 5
  learning_rate: 0.00002
  weight_decay: 0.01
  batch_size: 16
  gradient_accumulation_steps: 1
  eval_steps: 5000
  save_steps: 5000
  logging_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  checkpoint_subdir: cell_selector

e2e:
  use_heuristic_headers: true

consistency:
  sentence_embedding_model: sentence-transformers/all-MiniLM-L6-v2

plots:
  output_subdir: plots
  dpi: 200
